<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>传说之下超低配版</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <!-- 游戏首页 -->
        <div id="game-title">* 苏丹的游戏 *</div>
        <div id="story-box">
            <span class="cursor-blink"></span>
        </div>
        <div id="hint-text">[ 按任意键继续 ]</div>
        <!-- 战斗界面 -->
        <div id="battle-wrapper">
            <canvas id="battle-canvas" width="320" height="320"></canvas>
            <div id="battle-info">
                被击中: <span id="hit-count">0</span> / <span id="max-hits">8</span>
            </div>
            <div id="hp-bar">
                <div id="hp-bar-fill"></div>
            </div>
            <div style="color:#33ff33;font-size:0.55em;">WASD / 方向键 移动</div>
        </div>
        <!-- 骰子界面 -->
        <div id="dice-wrapper">
            <div id="dice-display" title="点击投掷">?</div>
            <div id="dice-result">无人知晓命运会归向何处.</div>
            <div style="color:#33ff33;font-size:0.55em;">也许你已伤痕累累。但要相信，命运一定会眷顾你！</div>
        </div>
        <!-- 结局界面 -->
        <div id="ending-wrapper">
            <div id="ending-text"></div>
            <button id="restart-btn">重新开始</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
